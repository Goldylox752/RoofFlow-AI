<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Book Your Onboarding Call | RoofFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0b1220;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.card {
  max-width: 600px;
  width: 100%;
  background: #121a2b;
  border: 1px solid #24314d;
  border-radius: 16px;
  padding: 40px;
  text-align: center;
}

h1 { font-size: 32px; margin-bottom: 10px; }

p {
  opacity: 0.8;
  margin-bottom: 25px;
  line-height: 1.5;
}

.badge {
  display: inline-block;
  background: #1e293b;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  margin-bottom: 15px;
}

.check {
  font-size: 40px;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #24314d;
  background: #0b1220;
  color: white;
  outline: none;
}

.btn {
  width: 100%;
  background: #4f46e5;
  color: #fff;
  padding: 14px;
  border-radius: 10px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  margin-top: 12px;
}

.btn:hover {
  opacity: 0.9;
}

.small {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">

  <div class="badge">RoofFlow Onboarding</div>

  <div class="check">🎉</div>

  <h1>You’re Qualified</h1>

  <p>
    Schedule your onboarding call so we can activate your lead flow system.
  </p>

  <!-- BOOKING FORM -->
  <form id="bookingForm">

    <input type="text" id="name" placeholder="Full Name" required />
    <input type="email" id="email" placeholder="Email Address" required />
    <input type="text" id="phone" placeholder="Phone Number" required />

    <select id="time" required>
      <option value="">Preferred Call Time</option>
      <option>Morning (9AM - 12PM)</option>
      <option>Afternoon (12PM - 4PM)</option>
      <option>Evening (4PM - 7PM)</option>
    </select>

    <button type="submit" class="btn">
      Request Onboarding Call
    </button>

  </form>

  <p class="small">
    We’ll contact you shortly to confirm your exact time slot.
  </p>

</div>

<!-- FORM LOGIC -->
<script>
document.getElementById("bookingForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    time: document.getElementById("time").value,
    created_at: new Date().toISOString()
  };

  try {
    // OPTIONAL: send to backend (you can build this next)
    await fetch("/api/booking", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    alert("Booking request sent. We'll contact you shortly.");
    document.getElementById("bookingForm").reset();

  } catch (err) {
    console.log(err);
    alert("Something went wrong. Please try again.");
  }
});
</script>

</body>
</html>
