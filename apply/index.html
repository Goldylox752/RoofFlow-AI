<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apply | RoofFlow</title>
<style>
body{font-family:Inter,sans-serif;background:#0b1220;color:#fff;margin:0;padding:40px}
.container{max-width:600px;margin:auto}
input,select{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none}
button{width:100%;padding:14px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-weight:700}
</style>
</head>
<body>
<div class="container">

<h2>Apply For Your City</h2>
<p>We only onboard serious contractors.</p>

<form id="applyForm">

<input name="name" placeholder="Full Name" required />
<input name="phone" placeholder="Phone Number" required />
<input name="email" placeholder="Email" required />

<input name="city" placeholder="City" required />

<select name="monthly_jobs" required>
<option value="">Monthly Jobs Completed</option>
<option>0-5</option>
<option>5-15</option>
<option>15+</option>
</select>

<select name="lead_spend" required>
<option value="">Monthly Ad/Lead Spend</option>
<option>$0</option>
<option>$500-$2000</option>
<option>$2000+</option>
</select>

<button type="submit">Apply Now</button>

</form>

</div>

<script>
document.getElementById("applyForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/api/apply", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(formData)
  });

  const data = await res.json();

  if (data.qualified) {
    window.location.href = "/book-call.html";
  } else {
    alert("Not a fit right now.");
  }
});
</script>

</body>
</html>
